name: Docker Hub 清理旧镜像

on:
  schedule:
    # 每周日凌晨 3 点运行（北京时间）
    - cron: '0 19 * * 0'
  workflow_dispatch:
    inputs:
      keep_count:
        description: '保留最新版本数（不含 latest）'
        required: false
        default: '3'

env:
  IMAGE_NAME: nnnnzs/react-nnnnzs-cn
  TZ: Asia/Shanghai

jobs:
  cleanup:
    name: 清理旧镜像
    runs-on: ubuntu-latest
    steps:
      - name: 获取并清理旧 tags
        env:
          KEEP_COUNT: ${{ github.event.inputs.keep_count || '3' }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "🕐 当前时间: $(date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "📦 镜像: ${{ env.IMAGE_NAME }}"
          echo "💾 保留最新 ${KEEP_COUNT} 个版本（不含 latest）"
          echo "---"

          # 获取 JWT Token（Registry API 认证）
          echo "🔑 获取 JWT Token..."
          TOKEN=$(curl -s -u "${DOCKER_USER}:${DOCKER_PASS}" \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${{ env.IMAGE_NAME }}:pull,push" \
            | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ 获取 JWT Token 失败"
            exit 1
          fi
          echo "✅ JWT Token 获取成功 (长度: ${#TOKEN})"

          # 获取所有 tags（通过 Registry API）
          ALL_TAGS=()
          PAGE=1
          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags?page_size=100&page=${PAGE}")

            TAGS=$(echo "$RESPONSE" | jq -r '.results[].name' 2>/dev/null)
            if [ -z "$TAGS" ]; then
              break
            fi

            while IFS= read -r tag; do
              ALL_TAGS+=("$tag")
            done <<< "$TAGS"

            NEXT=$(echo "$RESPONSE" | jq -r '.next // empty')
            if [ -z "$NEXT" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          echo "📋 找到 ${#ALL_TAGS[@]} 个 tags:"
          printf '   %s\n' "${ALL_TAGS[@]}"

          # 只保留 vYYYY.MM.DD.HH 格式的版本 tags
          VERSION_TAGS=()
          for tag in "${ALL_TAGS[@]}"; do
            if [[ "$tag" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
              VERSION_TAGS+=("$tag")
            else
              echo "   ⏭️  跳过非版本 tag: ${tag}"
            fi
          done

          echo ""
          echo "📊 版本 tags: ${#VERSION_TAGS[@]} 个"

          # 按版本号排序（vYYYY.MM.DD.HH 格式，字典序即时间序）
          IFS=$'\n' SORTED_TAGS=($(printf '%s\n' "${VERSION_TAGS[@]}" | sort -r))
          unset IFS

          echo "🔤 排序后前 5 个:"
          for i in 0 1 2 3 4; do
            [ $i -lt ${#SORTED_TAGS[@]} ] && echo "   [$((i+1))] ${SORTED_TAGS[$i]}"
          done

          # 确定要删除的 tags
          TO_DELETE=()
          for i in "${!SORTED_TAGS[@]}"; do
            if [ $i -ge $KEEP_COUNT ]; then
              TO_DELETE+=("${SORTED_TAGS[$i]}")
            fi
          done

          echo ""
          if [ ${#TO_DELETE[@]} -eq 0 ]; then
            echo "✅ 没有需要清理的 tags"
            exit 0
          fi

          echo "🗑️  将删除 ${#TO_DELETE[@]} 个 tags:"
          printf '   %s\n' "${TO_DELETE[@]}"
          echo ""

          # 通过 Registry API 删除 tags（先获取 digest 再删除 manifest）
          DELETED=0
          FAILED=0
          for tag in "${TO_DELETE[@]}"; do
            # 获取 tag 的 manifest digest
            DIGEST=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              -I "https://registry-1.docker.io/v2/${{ env.IMAGE_NAME }}/manifests/${tag}" \
              2>/dev/null | grep -i "docker-content-digest" | awk '{print $2}' | tr -d '\r')

            if [ -z "$DIGEST" ]; then
              echo "   ❌ 获取 digest 失败: ${tag}"
              FAILED=$((FAILED + 1))
              continue
            fi

            # 使用 digest 删除 manifest
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://registry-1.docker.io/v2/${{ env.IMAGE_NAME }}/manifests/${DIGEST}")

            if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "   ✅ 已删除: ${tag}"
              DELETED=$((DELETED + 1))
            else
              echo "   ❌ 删除失败: ${tag} (HTTP ${HTTP_CODE})"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "📊 清理完成: 成功 ${DELETED} 个, 失败 ${FAILED} 个"
