name: Docker Release

# 推送到 main 分支时触发，在 job 中判断是否跳过
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  skip-check:
    name: 检查是否跳过构建
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      should_build: ${{ steps.commit-check.outputs.should_build }}
      changed_files: ${{ steps.commit-check.outputs.changed_files }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 检查最新提交信息
        id: commit-check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" ${{ github.sha }})
          echo "提交信息: ${COMMIT_MSG}"

          # 获取更改的文件列表
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "更改的文件:"
          echo "$CHANGED_FILES"
          # 输出变更文件列表供后续步骤使用
          {
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # 检查是否仅更改了 docs 目录、.md 文件或非 workflow 的 CI 配置
          NON_DOCS_COUNT=$(echo "$CHANGED_FILES" | grep -vE '^docs/' | grep -vE '\.md$' | grep -vE '^\.github/(?!workflows)' | wc -l)

          # 跳过 docs: 和 chore: 开头的提交
          if echo "$COMMIT_MSG" | grep -qE '^(docs|chore)(\(.+\))?:'; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ 跳过构建（提交信息）：${COMMIT_MSG}"
          elif [ "$NON_DOCS_COUNT" -eq 0 ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ 跳过构建（仅 docs 更改）"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🔨 需要构建：${COMMIT_MSG}"
          fi

  build-and-deploy:
    name: 构建并部署
    needs: skip-check
    if: |
      always() && (
        needs.skip-check.result == 'success' && needs.skip-check.outputs.should_build == 'true'
      || github.event_name != 'push'
      || github.ref != 'refs/heads/main'
      )
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: nnnnzs/react-nnnnzs-cn

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置版本号
        id: version
        env:
          TZ: Asia/Shanghai
        run: |
          if git describe --tags --exact-match 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match)
          else
            VERSION="v$(date +'%Y.%m.%d.%H')"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date +'%Y-%m-%dT%H:%M:%S+08:00')" >> $GITHUB_OUTPUT

          echo "📦 构建版本: ${VERSION}"

      - name: 通知博客部署开始
        run: |
          curl -k -sS -X POST "https://www.nnnnzs.cn/api/deploy/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"status":"deploying","run_id":"${{ github.run_id }}","commit":"${{ steps.version.outputs.SHORT_SHA }}","version":"${{ steps.version.outputs.VERSION }}"}' || true

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 拉取基础镜像（带重试）
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=15
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "📦 拉取基础镜像 (尝试 ${ATTEMPT}/${MAX_RETRIES})..."
            if docker pull node:22-alpine; then
              echo "✅ 基础镜像拉取成功"
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⚠️  拉取失败，${RETRY_DELAY}秒后重试..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "❌ 基础镜像拉取失败"
          exit 1

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=release-build
          cache-to: type=gha,scope=release-build,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
            COMMIT_SHA=${{ steps.version.outputs.SHORT_SHA }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: 服务器部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: changed_files
          command_timeout: 20m
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            # 拉取最新代码（deploy.sh、purge_cdn.py 等脚本依赖此步骤）
            if [ -d ".git" ]; then
              echo "📥 拉取最新代码..."
              # 先 stash 本地修改，pull 后再恢复
              git stash || true
              git pull origin main || echo "⚠️  git pull 失败，使用现有代码继续部署"
              git stash pop || true
            fi
            # 写入变更文件列表（临时文件，deploy 后清理）
            echo "${changed_files}" > /tmp/.deploy_changed_files
            if [ -f "${{ secrets.DEPLOY_SCRIPT }}" ]; then
              bash "${{ secrets.DEPLOY_SCRIPT }}"
            else
              ${{ secrets.DEPLOY_SCRIPT }}
            fi
            rm -f /tmp/.deploy_changed_files
            echo "✅ 部署完成！"

      - name: 通知博客部署状态
        if: always()
        run: |
          DEPLOY_STATUS="${{ job.status }}"
          if [ "$DEPLOY_STATUS" = "success" ]; then
            WEBHOOK_STATUS="success"
          else
            WEBHOOK_STATUS="failure"
          fi

          curl -k -sS -X POST "https://www.nnnnzs.cn/api/deploy/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"status\":\"${WEBHOOK_STATUS}\",\"run_id\":\"${{ github.run_id }}\",\"commit\":\"${{ steps.version.outputs.SHORT_SHA }}\",\"version\":\"${{ steps.version.outputs.VERSION }}\"}" || true

      - name: 生成构建摘要
        if: success()
        run: |
          echo "## 🐳 Docker 镜像构建并部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 镜像信息" >> $GITHUB_STEP_SUMMARY
          echo "- **版本号**: \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像名称**: \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ steps.version.outputs.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **构建时间**: \`${{ steps.version.outputs.BUILD_DATE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **部署方式**: 推送到 Docker Hub + 服务器拉取部署" >> $GITHUB_STEP_SUMMARY

      - name: 发送部署成功通知
        if: success()
        run: |
          curl -H "Content-Type:application/json" -X POST -d '{"title":"自动部署","content":"react.nnnnzs.cn部署完成","url":"https://react.nnnnzs.cn"}' "${{ secrets.DEPLOY_NOTIFY_URL }}"

      - name: 发送部署失败通知
        if: failure()
        run: |
          curl -H "Content-Type:application/json" -X POST -d '{"title":"自动部署","content":"react.nnnnzs.cn部署失败","url":"https://react.nnnnzs.cn"}' "${{ secrets.DEPLOY_NOTIFY_URL }}"
