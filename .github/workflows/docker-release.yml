name: Docker Release

# 推送到 main 分支时触发，跳过 docs: 和 chore: 开头的提交
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  skip-check:
    name: 检查是否跳过构建
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      should_build: ${{ steps.commit-check.outputs.should_build }}
    steps:
      - name: 检查最新提交信息
        id: commit-check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" ${{ github.sha }})
          echo "提交信息: ${COMMIT_MSG}"

          # 跳过 docs: 和 chore: 开头的提交
          if echo "$COMMIT_MSG" | grep -qE '^(docs|chore)(\(.+\))?:'; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ 跳过构建：${COMMIT_MSG}"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🔨 需要构建：${COMMIT_MSG}"
          fi

  build-and-deploy:
    name: 构建并部署
    needs: skip-check
    if: |
      needs.skip-check.result == 'success' && needs.skip-check.outputs.should_build == 'true'
      || github.event_name != 'push'
      || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ccr.ccs.tencentyun.com
      IMAGE_NAME: ccr.ccs.tencentyun.com/nnnnzs/react.nnnnzs.cn
      LOCAL_IMAGE: react-nnnnzs-cn:release

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本号
        id: version
        run: |
          if git describe --tags --exact-match 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match)
          else
            VERSION="v$(date +'%Y.%m.%d.%H')"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

          echo "📦 构建版本: ${VERSION}"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像（本地加载，不推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha,scope=release-build
          cache-to: type=gha,scope=release-build,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
            COMMIT_SHA=${{ steps.version.outputs.SHORT_SHA }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_DB=${{ secrets.REDIS_DB }}
            WX_APP_ID=${{ secrets.WX_APP_ID }}
            WX_APP_SECRET=${{ secrets.WX_APP_SECRET }}

      - name: 导出镜像为 tar.gz
        run: |
          docker save ${{ env.LOCAL_IMAGE }} | gzip > /tmp/image.tar.gz
          echo "镜像大小："
          ls -lh /tmp/image.tar.gz

      - name: 创建服务器临时目录
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: mkdir -p /tmp/docker-deploy

      - name: SCP 传输镜像到服务器
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            /tmp/image.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/docker-deploy/image.tar.gz

      - name: 加载镜像、推送到 ACR 并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            echo "==> 加载 Docker 镜像..."
            docker load < /tmp/docker-deploy/image.tar.gz

            echo "==> 登录腾讯云 ACR..."
            echo "${{ secrets.ACR_PASSWORD }}" | docker login --username="${{ secrets.ACR_USERNAME }}" --password-stdin ${{ env.ACR_REGISTRY }}

            echo "==> 推送镜像到 ACR..."
            docker tag ${{ env.LOCAL_IMAGE }} ${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.IMAGE_NAME }}:latest

            echo "==> 清理临时文件..."
            rm -rf /tmp/docker-deploy

            echo "==> 执行部署脚本..."
            cd ${{ secrets.DEPLOY_DIR }}
            if [ -f "${{ secrets.DEPLOY_SCRIPT }}" ]; then
              bash "${{ secrets.DEPLOY_SCRIPT }}"
            else
              ${{ secrets.DEPLOY_SCRIPT }}
            fi

            echo "✅ 部署完成！"

      - name: 生成构建摘要
        if: success()
        run: |
          echo "## 🐳 Docker 镜像构建并部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 镜像信息" >> $GITHUB_STEP_SUMMARY
          echo "- **版本号**: \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像名称**: \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ steps.version.outputs.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **构建时间**: \`${{ steps.version.outputs.BUILD_DATE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **部署方式**: SCP 传输 + 服务器端推送到 ACR" >> $GITHUB_STEP_SUMMARY

      - name: 发送部署成功通知
        if: success()
        run: |
          curl -H "Content-Type:application/json" -X POST -d '{"title":"自动部署","content":"react.nnnnzs.cn部署完成","url":"https://react.nnnnzs.cn"}' "${{ secrets.DEPLOY_NOTIFY_URL }}"

      - name: 发送部署失败通知
        if: failure()
        run: |
          curl -H "Content-Type:application/json" -X POST -d '{"title":"自动部署","content":"react.nnnnzs.cn部署失败","url":"https://react.nnnnzs.cn"}' "${{ secrets.DEPLOY_NOTIFY_URL }}"
