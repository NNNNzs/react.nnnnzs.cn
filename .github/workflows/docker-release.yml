name: Docker Release

# 推送到 main 分支时触发，跳过 docs: 和 chore: 开头的提交
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  skip-check:
    name: 检查是否跳过构建
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      should_build: ${{ steps.commit-check.outputs.should_build }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 检查最新提交信息
        id: commit-check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" ${{ github.sha }})
          echo "提交信息: ${COMMIT_MSG}"

          # 跳过 docs: 和 chore: 开头的提交
          if echo "$COMMIT_MSG" | grep -qE '^(docs|chore)(\(.+\))?:'; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ 跳过构建：${COMMIT_MSG}"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🔨 需要构建：${COMMIT_MSG}"
          fi

  build-and-deploy:
    name: 构建并部署
    needs: skip-check
    if: |
      needs.skip-check.result == 'success' && needs.skip-check.outputs.should_build == 'true'
      || github.event_name != 'push'
      || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: nnnnzs/react-nnnnzs-cn

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本号
        id: version
        run: |
          if git describe --tags --exact-match 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match)
          else
            VERSION="v$(date +'%Y.%m.%d.%H')"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

          echo "📦 构建版本: ${VERSION}"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=release-build
          cache-to: type=gha,scope=release-build,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
            COMMIT_SHA=${{ steps.version.outputs.SHORT_SHA }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_DB=${{ secrets.REDIS_DB }}
            WX_APP_ID=${{ secrets.WX_APP_ID }}
            WX_APP_SECRET=${{ secrets.WX_APP_SECRET }}

      - name: 服务器部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            if [ -f "${{ secrets.DEPLOY_SCRIPT }}" ]; then
              bash "${{ secrets.DEPLOY_SCRIPT }}"
            else
              ${{ secrets.DEPLOY_SCRIPT }}
            fi
            echo "✅ 部署完成！"

      - name: 生成构建摘要
        if: success()
        run: |
          echo "## 🐳 Docker 镜像构建并部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 镜像信息" >> $GITHUB_STEP_SUMMARY
          echo "- **版本号**: \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像名称**: \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ steps.version.outputs.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **构建时间**: \`${{ steps.version.outputs.BUILD_DATE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **部署方式**: 推送到 Docker Hub + 服务器拉取部署" >> $GITHUB_STEP_SUMMARY

      - name: 发送部署成功通知
        if: success()
        run: |
          curl -H "Content-Type:application/json" -X POST -d '{"title":"自动部署","content":"react.nnnnzs.cn部署完成","url":"https://react.nnnnzs.cn"}' "${{ secrets.DEPLOY_NOTIFY_URL }}"

      - name: 发送部署失败通知
        if: failure()
        run: |
          curl -H "Content-Type:application/json" -X POST -d '{"title":"自动部署","content":"react.nnnnzs.cn部署失败","url":"https://react.nnnnzs.cn"}' "${{ secrets.DEPLOY_NOTIFY_URL }}"
